<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ER CMG — ER Contents Media Group</title>
  <meta name="description" content="ER Contents Media Group — Live Entertainment, Media & Contents, Brand & Partnerships. Seoul, Korea.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;700;800&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── RESET & BASE ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #040404;
      color: #fff;
      font-family: 'Open Sans', 'Noto Sans KR', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden; /* hero only — no scroll on main page */
    }

    /* ── CSS VARIABLES ── */
    :root {
      --nav-h: 80px;
      --pad-x: 5%;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: #040404;
    }

    /* VIDEO */
    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
      filter: brightness(0.45);
    }

    /* GRAIN */
    .hero-grain {
      position: absolute;
      inset: 0;
      z-index: 2;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    /* SCANLINES */
    .hero-scanlines {
      position: absolute;
      inset: 0;
      z-index: 3;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0, 0, 0, 0.025) 3px,
        rgba(0, 0, 0, 0.025) 4px
      );
      pointer-events: none;
    }

    /* VIGNETTE */
    .hero-vignette {
      position: absolute;
      inset: 0;
      z-index: 4;
      background:
        radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.55) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 15%, transparent 75%, rgba(0,0,0,0.6) 100%),
        linear-gradient(to right, rgba(0,0,0,0.5) 0%, transparent 25%, transparent 75%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
    }

    /* ── KINETIC TYPOGRAPHY ── */
    .hero-kinetic {
      position: absolute;
      bottom: 18%;
      left: var(--pad-x);
      z-index: 15;
      display: flex;
      flex-direction: column;
      line-height: 0.875;
      font-family: 'Open Sans', 'Noto Sans KR', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 9.5vw, 112px);
      letter-spacing: -0.04em;
      text-transform: uppercase;
      user-select: none;
    }

    .hero-kinetic .k-solid {
      color: #fff;
    }

    .hero-kinetic .k-outline {
      color: transparent;
      -webkit-text-stroke: clamp(1px, 0.15vw, 2px) rgba(255, 255, 255, 0.3);
    }

    /* ── NAV ── */
    .nav {
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 20;
      height: var(--nav-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding:  0 var(--pad-x) 0 20px;
      background: transparent;
      border-bottom: 1px solid transparent;
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    .nav.solid {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid #e3e3e3;
    }

    /* LOGO */
    .nav-logo {
      text-decoration: none;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .nav-logo img {
      height: 56px;
      width: auto;
      object-fit: contain;
    }

    /* LINKS */
    .nav-links {
      display: flex;
      align-items: center;
      gap: clamp(16px, 2.5vw, 40px);
      list-style: none;
    }

    .nav-links a {
      font-size: clamp(10px, 1vw, 13px);
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.70);
      text-decoration: none;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: #fff; }

    .nav.solid .nav-links a { color: #555; }
    .nav.solid .nav-links a:hover { color: #000; }

    /* ── CORNER — BOTTOM LEFT ── */
    .hero-corner-bl {
      position: absolute;
      bottom: 6%;
      left: var(--pad-x);
      z-index: 15;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .corner-line {
      display: block;
      width: clamp(16px, 2vw, 28px);
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
      flex-shrink: 0;
    }

    .corner-text {
      font-size: clamp(7px, 0.9vw, 11px);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.58);
      white-space: nowrap;
    }

    /* ── CORNER — BOTTOM RIGHT ── */
    .hero-corner-br {
      position: absolute;
      bottom: 6%;
      right: var(--pad-x);
      z-index: 15;
      font-size: clamp(7px, 0.85vw, 10px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.50);
      white-space: nowrap;
    }

    /* ── SCROLL HINT ── */
    .hero-scroll-hint {
      position: absolute;
      right: var(--pad-x);
      top: 50%;
      transform: translateY(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scroll-label {
      font-size: clamp(6px, 0.7vw, 8px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.47);
      writing-mode: vertical-lr;
    }

    .scroll-line {
      display: block;
      width: 1px;
      height: clamp(30px, 4vw, 50px);
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255, 255, 255, 0.2),
        transparent
      );
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      :root { --pad-x: 4%; }
    }



    /* ── HAMBURGER BUTTON ── */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 12px;
      z-index: 21;
      margin-right: -4px;
      isolation: isolate;
      transform: translateZ(0);
    }
    .nav-hamburger span {
      display: block;
      width: 16px;
      height: 1.5px;
      background: #fff;
      transition: transform 0.3s ease, opacity 0.3s ease;
      transform-origin: center;
    }
    .nav-hamburger.open span:nth-child(1) {
      transform: translateY(8.5px) rotate(45deg);
    }
    .nav-hamburger.open span:nth-child(2) {
      opacity: 0;
    }
    .nav-hamburger.open span:nth-child(3) {
      transform: translateY(-8.5px) rotate(-45deg);
    }

    /* ── MOBILE MENU OVERLAY ── */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 19;
      background: #040404;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 var(--pad-x);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .mobile-menu.open {
      opacity: 1;
    }
    .mobile-menu ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .mobile-menu a {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 500;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.62);
      text-decoration: none;
      transition: color 0.15s;
      display: block;
      padding: 6px 0;
    }
    .mobile-menu a:hover { color: #fff; }

    @media (max-width: 768px) {
      /* Nav 링크 숨김 */
      .nav-links { display: none; }

      /* 햄버거 버튼 표시 */
      .nav-hamburger { display: flex; }

      /* 스크롤 힌트 숨김 — 모바일 공간 확보 */
      .hero-scroll-hint { display: none; }

      /* 코너 텍스트 모바일 축소 */
      .corner-text { letter-spacing: 0.10em; }

      /* 타이포: vw/vh 중 작은 값 사용 — 가로 모드 대응 */
      .hero-kinetic {
        font-size: clamp(24px, min(8.5vw, 9.5vh), 60px);
        bottom: 20%;
      }

      /* 모바일 메뉴 활성화 */
      .mobile-menu { display: flex; }
    }

    @media (max-width: 480px) {
      /* 우하단 코너 숨김 — 모바일 최소화 */
      .hero-corner-br { display: none; }
    }

    /* ── FOOTER ── */
    .site-footer {
      position: relative; z-index: 20;
      height: 52px;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 0 var(--pad-x);
      display: flex; align-items: center; justify-content: space-between;
      background: #040404;
    }
    .ft { font-size: 10px; color: rgba(255,255,255,0.48); letter-spacing: 0.08em; }
</style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav" id="nav" aria-label="주 메뉴">
    <a class="nav-logo" href="index.html"><img src="ERlogo.png?v=2" alt="ER CMG"></a>
    <ul class="nav-links">
      <li><a href="aboutus.html">About Us</a></li>
      <li><a href="business.html">Business</a></li>
      <li><a href="ourworks.html">Our Works</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="notice.html">Notice</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="nav-hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu" aria-hidden="true">
    <ul>
      <li><a href="aboutus.html">About Us</a></li>
      <li><a href="business.html">Business</a></li>
      <li><a href="#">Our Works</a></li>
      <li><a href="projects.html">Projects</a></li>
      <li><a href="news.html">News</a></li>
      <li><a href="notice.html">Notice</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </div>

  <!-- HERO -->
  <section class="hero" id="hero" aria-label="히어로">

    <!-- 1. VIDEO (z-index: 1) -->
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="herov.mp4" type="video/mp4">
    </video>

    <!-- 2. GRAIN (z-index: 2) -->
    <div class="hero-grain" aria-hidden="true"></div>

    <!-- 3. SCANLINES (z-index: 3) -->
    <div class="hero-scanlines" aria-hidden="true"></div>

    <!-- 4. VIGNETTE (z-index: 4) -->
    <div class="hero-vignette" aria-hidden="true"></div>

    <!-- 5. KINETIC TYPOGRAPHY (z-index: 15) -->
    <div class="hero-kinetic" role="img" aria-label="Stage. Screen. Story.">
      <span class="k-solid" aria-hidden="true">STAGE.</span>
      <span class="k-outline" aria-hidden="true">SCREEN.</span>
      <span class="k-solid" aria-hidden="true">STORY.</span>
    </div>

    <!-- 6. CORNER — BOTTOM LEFT (z-index: 15) -->
    <div class="hero-corner-bl" aria-hidden="true">
      <span class="corner-line"></span>
      <span class="corner-text">Sound · Stage · Story</span>
    </div>

    <!-- 7. CORNER — BOTTOM RIGHT (z-index: 15) -->
    <div class="hero-corner-br" aria-hidden="true">Seoul · Est. 2018</div>

    <!-- 8. SCROLL HINT — RIGHT CENTER (z-index: 15) -->
    <div class="hero-scroll-hint" aria-hidden="true">
      <span class="scroll-label">scroll</span>
      <span class="scroll-line"></span>
    </div>

  </section>

  <footer class="site-footer">
    <span class="ft">© 2026 ER Contents Media Group</span>
    <span class="ft">Seoul, Korea</span>
  </footer>

  <script>
    const nav = document.getElementById('nav');
    const onScroll = () => nav.classList.toggle('solid', window.scrollY > 60);
    window.addEventListener('scroll', onScroll, { passive: true });

    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', () => {
      const isOpen = hamburger.classList.toggle('open');
      hamburger.setAttribute('aria-expanded', isOpen);
      mobileMenu.setAttribute('aria-hidden', !isOpen);
      if (isOpen) {
        mobileMenu.style.display = 'flex';
        requestAnimationFrame(() => mobileMenu.classList.add('open'));
      } else {
        mobileMenu.classList.remove('open');
        mobileMenu.addEventListener('transitionend', () => {
          if (!mobileMenu.classList.contains('open')) mobileMenu.style.display = 'none';
        }, { once: true });
      }
    });

    mobileMenu.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        mobileMenu.classList.remove('open');
        mobileMenu.setAttribute('aria-hidden', 'true');
        mobileMenu.addEventListener('transitionend', () => {
          mobileMenu.style.display = 'none';
        }, { once: true });
      });
    });
  </script>

</body>
</html>
